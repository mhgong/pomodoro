<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro · Focus</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app" id="app">
    <header class="topbar">
      <h1>🍅 Pomodoro</h1>
      <button id="themeBtn" class="ghost" title="Toggle theme">🌙</button>
    </header>

    <!-- Mode tabs -->
    <nav class="modes" role="tablist">
      <button class="mode active" data-mode="focus" role="tab">Focus</button>
      <button class="mode" data-mode="short" role="tab">Short break</button>
      <button class="mode" data-mode="long" role="tab">Long break</button>
    </nav>

    <!-- Timer -->
    <section class="timer-card">
      <svg class="ring" viewBox="0 0 240 240" aria-hidden="true">
        <circle class="ring-bg" cx="120" cy="120" r="110" />
        <circle class="ring-fg" id="ringFg" cx="120" cy="120" r="110" />
      </svg>
      <div class="timer-inner">
        <div class="time" id="time">25:00</div>
        <div class="round" id="roundLabel">Round 1</div>
      </div>
    </section>

    <div class="controls">
      <button id="startBtn" class="primary">Start</button>
      <button id="resetBtn" class="ghost">Reset</button>
      <button id="skipBtn" class="ghost">Skip ⏭</button>
    </div>

    <!-- Quick stats -->
    <section class="stats">
      <div><strong id="statSessions">0</strong><span>focus done</span></div>
      <div><strong id="statMinutes">0</strong><span>minutes focused</span></div>
    </section>

    <!-- History -->
    <section class="history">
      <div class="history-head">
        <h2>History</h2>
        <div class="hist-controls">
          <button class="hist-range active" data-range="7">7 d</button>
          <button class="hist-range" data-range="30">30 d</button>
          <button id="exportBtn" class="ghost small" title="Export history as CSV">⬇ CSV</button>
          <button id="importBtn" class="ghost small" title="Import history from a CSV">⬆ CSV</button>
          <input id="importFile" type="file" accept=".csv,text/csv" hidden />
        </div>
      </div>
      <div id="histChart" class="hist-chart"></div>
      <p id="histTotal" class="hist-total"></p>
    </section>

    <!-- Tasks -->
    <section class="tasks">
      <div class="tasks-head">
        <h2>Tasks</h2>
        <button id="clearDoneBtn" class="ghost small">Clear completed</button>
      </div>
      <form id="taskForm" class="task-form">
        <input id="taskInput" type="text" placeholder="Add a task…" autocomplete="off" maxlength="120" />
        <button type="submit" class="primary small">Add</button>
      </form>
      <ul id="taskList" class="task-list"></ul>
      <p id="emptyHint" class="hint">No tasks yet. Add one to get started 👆</p>
    </section>

    <!-- Settings -->
    <details class="settings">
      <summary>⚙️ Settings</summary>
      <div class="settings-grid">
        <label>Focus (min)<input id="cfgFocus" type="number" min="1" max="90" value="25" /></label>
        <label>Short break<input id="cfgShort" type="number" min="1" max="30" value="5" /></label>
        <label>Long break<input id="cfgLong" type="number" min="1" max="60" value="15" /></label>
        <label>Rounds before long break<input id="cfgInterval" type="number" min="2" max="8" value="4" /></label>
        <label class="check"><input id="cfgAuto" type="checkbox" /> Auto-start next</label>
        <label class="check"><input id="cfgSound" type="checkbox" checked /> End sound</label>
      </div>
    </details>
  </main>

  <script src="app.js"></script>
</body>
</html>
